# ═══════════════════════════════════════════════════════════════
# GitLab CI/CD Pipeline — Flask CRUD App
# ═══════════════════════════════════════════════════════════════

image: python:3.11-slim

stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SECRET_KEY: "ci-gitlab-secret-key"

cache:
  paths:
    - .cache/pip


# ════════════════════════════════════════════════════════════════
# STAGE 1 — Lint & Code Quality
# ════════════════════════════════════════════════════════════════
lint:
  stage: lint
  before_script:
    - pip install -r requirements.txt
  script:
    - echo "Menjalankan Flake8..."
    - flake8 app.py database.py --statistics
    - echo "Lint selesai!"


# ════════════════════════════════════════════════════════════════
# STAGE 2 — Run Tests & Coverage
# ════════════════════════════════════════════════════════════════
test:
  stage: test
  needs: [lint]
  before_script:
    - pip install -r requirements.txt
  script:
    - echo "Menjalankan Pytest..."
    - coverage run -m pytest tests/ -v --tb=short
    - coverage report --fail-under=70
    - coverage xml -o coverage.xml
    - echo "Semua test passed!"
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days


# ════════════════════════════════════════════════════════════════
# STAGE 3 — Security Scan
# ════════════════════════════════════════════════════════════════
security:bandit:
  stage: security
  needs: [lint]
  before_script:
    - pip install bandit
  script:
    - echo "Menjalankan Bandit SAST..."
    - bandit -r app.py database.py -ll --skip B104,B105,B201
    - echo "Bandit scan selesai!"

security:pip-audit:
  stage: security
  needs: [lint]
  allow_failure: true
  before_script:
    - pip install pip-audit
  script:
    - echo "Menjalankan pip-audit..."
    - pip-audit -r requirements.txt --skip-editable


# ════════════════════════════════════════════════════════════════
# STAGE 4 — Build & Validate
# ════════════════════════════════════════════════════════════════
build:
  stage: build
  needs: [test, security:bandit]
  before_script:
    - pip install -r requirements.txt
  script:
    - echo "Validasi startup aplikasi..."
    - python -c "from app import app, db; app.config['SQLALCHEMY_DATABASE_URI']='sqlite:///:memory:'; app.config['TESTING']=True;
      exec(open('/dev/null').read()) if False else None;
      __import__('sys').stdout.write('App import OK\n')"
    - python -c "
      from app import app
      from database import db
      app.config['TESTING'] = True
      app.config['SQLALCHEMY_DATABASE_URI'] = 'sqlite:///:memory:'
      with app.app_context():
          db.create_all()
          client = app.test_client()
          res = client.get('/health')
          assert res.status_code == 200
          print('Health check passed')
      "
    - echo "Build validation selesai!"
  artifacts:
    paths:
      - app.py
      - database.py
      - requirements.txt
      - templates/
      - static/
    expire_in: 14 days


# ════════════════════════════════════════════════════════════════
# STAGE 5 — Deploy Staging (hanya branch main)
# ════════════════════════════════════════════════════════════════
deploy:staging:
  stage: deploy
  needs: [build]
  environment:
    name: staging
    url: https://your-staging-url.example.com
  script:
    - echo "Deploy ke staging..."
    - echo "Commit $CI_COMMIT_SHA"
    - echo "Branch $CI_COMMIT_REF_NAME"
    - echo "Oleh $GITLAB_USER_NAME"
    - echo "Deploy selesai!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
