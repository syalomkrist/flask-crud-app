image: python:3.11-slim

stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SECRET_KEY: "ci-gitlab-secret-key"

cache:
  paths:
    - .cache/pip


# ── STAGE 1: Lint ────────────────────────────────────────────
lint:
  stage: lint
  before_script:
    - pip install -r requirements.txt
  script:
    - flake8 app.py database.py --statistics


# ── STAGE 2: Test ────────────────────────────────────────────
test:
  stage: test
  needs: ["lint"]
  before_script:
    - pip install -r requirements.txt
  script:
    - coverage run -m pytest tests/ -v --tb=short
    - coverage report --fail-under=70
    - coverage xml -o coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days


# ── STAGE 3: Security ────────────────────────────────────────
bandit-scan:
  stage: security
  needs: ["lint"]
  before_script:
    - pip install bandit
  script:
    - bandit -r app.py database.py -ll --skip B104,B105,B201

pip-audit-scan:
  stage: security
  needs: ["lint"]
  allow_failure: true
  before_script:
    - pip install pip-audit
  script:
    - pip-audit -r requirements.txt --skip-editable


# ── STAGE 4: Build ───────────────────────────────────────────
build-validate:
  stage: build
  needs: ["test", "bandit-scan"]
  before_script:
    - pip install -r requirements.txt
  script:
    - echo "from app import app; from database import db; app.config[\"SQLALCHEMY_DATABASE_URI\"]=\"sqlite:///:memory:\"; app.config[\"TESTING\"]=True" > check_app.py
    - echo "with app.app_context():" >> check_app.py
    - echo "    db.create_all()" >> check_app.py
    - echo "    c = app.test_client()" >> check_app.py
    - echo "    r = c.get('/health')" >> check_app.py
    - echo "    assert r.status_code == 200, f'health check failed {r.status_code}'" >> check_app.py
    - echo "    print('Health check passed:', r.get_json())" >> check_app.py
    - python check_app.py
  artifacts:
    paths:
      - app.py
      - database.py
      - requirements.txt
      - templates/
      - static/
    expire_in: 14 days


# ── STAGE 5: Deploy ──────────────────────────────────────────
deploy-staging:
  stage: deploy
  needs: ["build-validate"]
  environment:
    name: staging
    url: https://your-staging-url.example.com
  script:
    - echo "Deploying commit $CI_COMMIT_SHA to staging..."
    - echo "Branch $CI_COMMIT_REF_NAME by $GITLAB_USER_NAME"
    - echo "Deploy simulation complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
