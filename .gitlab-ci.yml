image: python:3.11-slim

stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SECRET_KEY: "ci-gitlab-secret-key"

cache:
  paths:
    - .cache/pip


lint:
  stage: lint
  before_script:
    - pip install -r requirements.txt
  script:
    - flake8 app.py database.py --statistics


test:
  stage: test
  needs: ["lint"]
  before_script:
    - pip install -r requirements.txt
  script:
    - coverage run -m pytest tests/ -v --tb=short
    - coverage report --fail-under=70
    - coverage xml -o coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days


bandit-scan:
  stage: security
  needs: ["lint"]
  before_script:
    - pip install bandit
  script:
    - bandit -r app.py database.py -ll --skip B104,B105,B201


pip-audit-scan:
  stage: security
  needs: ["lint"]
  allow_failure: true
  before_script:
    - pip install pip-audit
  script:
    - pip-audit -r requirements.txt --skip-editable


build-validate:
  stage: build
  needs: ["test", "bandit-scan"]
  before_script:
    - pip install -r requirements.txt
  script:
    - python validate_app.py
  artifacts:
    paths:
      - app.py
      - database.py
      - requirements.txt
      - templates/
      - static/
    expire_in: 14 days


deploy-staging:
  stage: deploy
  needs: ["build-validate"]
  environment:
    name: staging
    url: https://your-staging-url.example.com
  script:
    - echo "Deploying $CI_COMMIT_SHA by $GITLAB_USER_NAME"
    - echo "Deploy simulation complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
