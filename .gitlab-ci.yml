# ═══════════════════════════════════════════════════════════════
# GitLab CI/CD Pipeline — Flask CRUD App
# ═══════════════════════════════════════════════════════════════

image: python:3.11-slim

# ── Urutan Stage ─────────────────────────────────────────────
stages:
  - lint
  - test
  - security
  - build
  - deploy

# ── Cache pip agar lebih cepat ───────────────────────────────
cache:
  paths:
    - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SECRET_KEY: "ci-gitlab-secret-key"

# ── Template install dependencies (reusable) ─────────────────
.install_deps: &install_deps
  before_script:
    - pip install -r requirements.txt


# ════════════════════════════════════════════════════════════════
# STAGE 1 — Lint & Code Quality
# ════════════════════════════════════════════════════════════════
lint:
  stage: lint
  <<: *install_deps
  script:
    - echo "🔍 Menjalankan Flake8..."
    - flake8 app.py database.py --statistics
    - echo "✅ Lint selesai!"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_MERGE_REQUEST_ID'


# ════════════════════════════════════════════════════════════════
# STAGE 2 — Run Tests & Coverage
# ════════════════════════════════════════════════════════════════
test:
  stage: test
  <<: *install_deps
  script:
    - echo "🧪 Menjalankan Pytest..."
    - coverage run -m pytest tests/ -v --tb=short
    - coverage report --fail-under=70
    - coverage xml -o coverage.xml
    - echo "✅ Semua test passed!"
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  needs:
    - lint


# ════════════════════════════════════════════════════════════════
# STAGE 3 — Security Scan
# ════════════════════════════════════════════════════════════════
security:bandit:
  stage: security
  script:
    - pip install bandit
    - echo "🔒 Menjalankan Bandit SAST..."
    - bandit -r app.py database.py -ll --skip B104,B105,B201
    - echo "✅ Bandit scan selesai!"
  needs:
    - lint

security:pip-audit:
  stage: security
  allow_failure: true   # CVE ditemukan → laporan saja, tidak block pipeline
  script:
    - pip install pip-audit
    - echo "🛡️ Menjalankan pip-audit..."
    - pip-audit -r requirements.txt --skip-editable
  needs:
    - lint


# ════════════════════════════════════════════════════════════════
# STAGE 4 — Build & Validate
# ════════════════════════════════════════════════════════════════
build:
  stage: build
  <<: *install_deps
  script:
    - echo "🔨 Validasi startup aplikasi..."
    - python -c "
      from app import app, db
      with app.app_context():
          db.create_all()
          print('✅ Database initialized')
      print('✅ App startup OK')
      "
    - echo "🏥 Health check..."
    - python -c "
      from app import app
      from database import db
      app.config['TESTING'] = True
      app.config['SQLALCHEMY_DATABASE_URI'] = 'sqlite:///:memory:'
      with app.app_context():
          db.create_all()
          client = app.test_client()
          res = client.get('/health')
          assert res.status_code == 200
          print('✅ Health check passed:', res.get_json())
      "
  artifacts:
    paths:
      - app.py
      - database.py
      - requirements.txt
      - templates/
      - static/
    expire_in: 14 days
  needs:
    - test
    - security:bandit


# ════════════════════════════════════════════════════════════════
# STAGE 5 — Deploy Staging (hanya branch main)
# ════════════════════════════════════════════════════════════════
deploy:staging:
  stage: deploy
  environment:
    name: staging
    url: https://your-staging-url.example.com  # Ganti URL staging Anda
  script:
    - echo "🚀 Deploy ke staging..."
    - echo "📦 Commit  $CI_COMMIT_SHA"
    - echo "🌿 Branch  $CI_COMMIT_REF_NAME"
    - echo "👤 Oleh    $GITLAB_USER_NAME"
    - echo "✅ Deploy selesai!"
    # Ganti dengan perintah deploy nyata:
    # - ssh user@server "cd /app && git pull && pip install -r requirements.txt && systemctl restart flask-app"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build
