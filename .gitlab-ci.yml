image: python:3.11-slim

stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  SECRET_KEY: "ci-gitlab-secret-key"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

lint:
  stage: lint
  before_script:
    - pip install -r requirements.txt
  script:
    - flake8 app.py database.py --statistics

test:
  stage: test
  before_script:
    - pip install -r requirements.txt
  script:
    - coverage run -m pytest tests/ -v --tb=short
    - coverage report --fail-under=70
    - coverage xml -o coverage.xml

bandit-scan:
  stage: security
  before_script:
    - pip install bandit
  script:
    - bandit -r app.py database.py -ll --skip B104,B105,B201

pip-audit-scan:
  stage: security
  allow_failure: true
  before_script:
    - pip install pip-audit
  script:
    - pip-audit -r requirements.txt --skip-editable

build-validate:
  stage: build
  before_script:
    - pip install -r requirements.txt
  script:
    - python validate_app.py

deploy-staging:
  stage: deploy
  environment:
    name: staging
    url: https://your-staging-url.example.com
  script:
    - echo "Deploying commit $CI_COMMIT_SHA by $GITLAB_USER_NAME to staging..."
    - echo "Branch $CI_COMMIT_BRANCH - Deploy simulation complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
